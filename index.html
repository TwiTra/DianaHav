<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeutschLern – Diana's Sprachreise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app" class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-flag">🇩🇪</span>
        <div>
          <div class="logo-title">DeutschLern</div>
          <div class="logo-subtitle">Diana's Sprachreise</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group">
          <div class="nav-group-label">Übersicht</div>
          <a class="nav-link active" data-page="home" href="#">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Dashboard
          </a>
          <a class="nav-link" data-page="vocabulary" href="#">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Vokabeln
            <span class="nav-badge vocab-count" id="vocab-badge">0</span>
          </a>
          <a class="nav-link" data-page="books" href="#">
            <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
            Bücher
          </a>
        </div>

        <div class="nav-group">
          <div class="nav-group-label">Sprachniveaus</div>
          <a class="nav-link level-link" data-page="level" data-level="A1" href="#">
            <span class="level-dot" style="--c:#10b981"></span>A1 – Anfänger
          </a>
          <a class="nav-link level-link" data-page="level" data-level="A2" href="#">
            <span class="level-dot" style="--c:#06b6d4"></span>A2 – Grundlagen
          </a>
          <a class="nav-link level-link" data-page="level" data-level="B1" href="#">
            <span class="level-dot" style="--c:#8b5cf6"></span>B1 – Mittelstufe
            <span class="nav-badge current-badge">★ Aktuell</span>
          </a>
          <a class="nav-link level-link" data-page="level" data-level="B2" href="#">
            <span class="level-dot" style="--c:#f59e0b"></span>B2 – Oberstufe
          </a>
          <a class="nav-link level-link" data-page="level" data-level="C1" href="#">
            <span class="level-dot" style="--c:#ef4444"></span>C1 – Fortgeschritten
          </a>
        </div>
      </nav>

      <div class="sidebar-user">
        <div class="user-avatar">Д</div>
        <div>
          <div class="user-name">Diana</div>
          <div class="user-goal">🎯 B1-Prüfung 2025</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Menü öffnen">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-breadcrumb" id="breadcrumb">Dashboard</div>
        <div class="topbar-actions">
          <button class="btn-icon" id="theme-toggle" title="Helles/Dunkles Design">☀️</button>
        </div>
      </header>
      <div class="page-wrap" id="page-wrap">
        <!-- Pages are rendered here by JavaScript -->
      </div>
    </main>
  </div>

  <!-- Exercise / Unit Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" style="display:none">
    <div class="modal" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <div id="modal-body" class="modal-body-inner"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999;display:none"></canvas>

  <script src="js/data.js"></script>
  <script src="js/vocabulary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
