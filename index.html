<!DOCTYPE html>
<html lang="de" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeutschLern – Diana</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="confetti-canvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:9999;display:none"></canvas>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="#">
      <span class="logo-flag">🇩🇪</span>
      <div>
        <div class="logo-title">DeutschLern</div>
        <div class="logo-subtitle">für Diana ✨</div>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Übersicht</div>
        <a class="nav-link active" data-page="home" href="#">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a class="nav-link" data-page="vocabulary" href="#">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Vokabeln
          <span class="nav-badge current-badge" id="vocab-badge">0</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Sprachniveaus</div>
        <a class="nav-link" data-page="level" data-level="A1" href="#">
          <span class="level-dot" style="--c:#10b981"></span>A1 – Anfänger
        </a>
        <a class="nav-link" data-page="level" data-level="A2" href="#">
          <span class="level-dot" style="--c:#06b6d4"></span>A2 – Grundkenntnisse
        </a>
        <a class="nav-link" data-page="level" data-level="B1" href="#">
          <span class="level-dot" style="--c:#8b5cf6"></span>B1 – Mittelstufe
        </a>
        <a class="nav-link" data-page="level" data-level="B2" href="#">
          <span class="level-dot" style="--c:#f59e0b"></span>B2 – Oberstufe
        </a>
        <a class="nav-link" data-page="level" data-level="C1" href="#">
          <span class="level-dot" style="--c:#ef4444"></span>C1 – Fortgeschritten
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Bücher</div>
        <a class="nav-link" data-page="books" href="#">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Alle Bücher
        </a>
        <a class="nav-link" data-page="book" data-book="netzwerk-b1" href="#">
          <span style="font-size:1rem">📗</span> Netzwerk B1 Neu
        </a>
      </div>
    </nav>

    <div style="padding:14px 18px;border-top:1px solid var(--border)">
      <button id="theme-toggle" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;color:var(--text);font-size:.9rem;font-family:var(--font)">🌙</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn">☰</button>
      <div class="topbar-breadcrumb" id="breadcrumb">Dashboard</div>
    </header>
    <div class="page-wrap" id="page-wrap"></div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" style="max-width:720px;width:100%">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-body-inner" id="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<script src="js/data.js"></script>
<script src="js/books/netzwerk-b1.js"></script>
<script src="js/vocabulary.js"></script>
<script src="js/app.js"></script>
</body>
</html>
